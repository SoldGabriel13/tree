<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Klattsch Keyboard (fixed)</title>
</head>

<body>
  <h3>Klattsch Real-Time Keyboard</h3>
  <p>Keys: A, E, H, T, S</p>

<script type="module">
import workletUrl from "https://esm.sh/klattsch/formant-worklet.js?url";

const ctx = new AudioContext();

await ctx.audioWorklet.addModule(workletUrl);

const node = new AudioWorkletNode(ctx, "formant-processor", {
  outputChannelCount: [1]
});

node.connect(ctx.destination);

// -----------------------------
// LOAD REAL BANK (THIS IS THE FIX)
// -----------------------------
const bank = await fetch(
  "https://raw.githubusercontent.com/tgies/klattsch/main/src/banks/klatt1980-en.json"
).then(r => r.json());

console.log("Bank loaded:", Object.keys(bank.phonemes));

// -----------------------------
// KEY MAP (your request)
// -----------------------------
const keyMap = {
  A: "AA",
  E: "E",
  H: "HH",
  T: "T",
  S: "S"
};

async function unlock() {
  if (ctx.state !== "running") await ctx.resume();
}

function play(phoneme) {
  const target = bank.phonemes?.[phoneme];

  if (!target) {
    console.warn("Missing phoneme:", phoneme);
    return;
  }

  node.port.postMessage({
    type: "frame",
    target,
    transitionMs: 30
  });
}

window.addEventListener("keydown", async (e) => {
  await unlock();

  const key = e.key.toUpperCase();
  const phoneme = keyMap[key];

  if (phoneme) play(phoneme);
});

</script>

</body>
</html>
