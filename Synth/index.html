<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Klattsch Keyboard</title>
</head>

<body>
  <h3>Klattsch Real-Time Keyboard</h3>
  <p>Keys: A, E, H, T, S</p>

<script type="module">

// ------------------------------
// AUDIO CONTEXT
// ------------------------------
const ctx = new AudioContext();

// ------------------------------
// LOAD WORKLET (FIXED)
// ------------------------------
const workletUrl =
  "https://cdn.jsdelivr.net/npm/klattsch/formant-worklet.js";

await ctx.audioWorklet.addModule(workletUrl);

// ------------------------------
// NODE
// ------------------------------
const node = new AudioWorkletNode(ctx, "formant-processor", {
  outputChannelCount: [1]
});

node.connect(ctx.destination);

// ------------------------------
// LOAD BANK (KEEP YOUR APPROACH)
// ------------------------------
const bank = await fetch(
  "https://raw.githubusercontent.com/tgies/klattsch/main/src/banks/klatt1980-en.json"
).then(r => r.json());

console.log("Bank loaded:", Object.keys(bank.phonemes));

// ------------------------------
// KEY MAP
// ------------------------------
const keyMap = {
  A: "AA",
  E: "E",
  H: "HH",
  T: "T",
  S: "S"
};

// ------------------------------
async function unlock() {
  if (ctx.state !== "running") await ctx.resume();
}

// ------------------------------
function play(phoneme) {
  const target = bank.phonemes?.[phoneme];

  if (!target) {
    console.warn("Missing phoneme:", phoneme);
    return;
  }

  node.port.postMessage({
    type: "frame",
    target,
    transitionMs: 30
  });
}

// ------------------------------
window.addEventListener("keydown", async (e) => {
  await unlock();

  const phoneme = keyMap[e.key.toUpperCase()];
  if (!phoneme) return;

  play(phoneme);
});

</script>

</body>
</html>
