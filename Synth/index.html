<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Klattsch Keyboard</title>
</head>

<body>
  <h3>Klattsch Real-Time Formant Keyboard</h3>
  <p>Keys: A (AA), E (E), H (HH), T (T), S (S)</p>

<script type="module">

// -----------------------------
// AUDIO SETUP
// -----------------------------
const ctx = new AudioContext();

// IMPORTANT: must be local path in your repo
await ctx.audioWorklet.addModule("./src/formant-worklet.js");

const node = new AudioWorkletNode(ctx, "formant-processor", {
  outputChannelCount: [1]
});

node.connect(ctx.destination);

// -----------------------------
// LOAD BANK (LOCAL FILE, NOT CDN)
// -----------------------------
const bank = await fetch("./src/banks/klatt1980-en.json")
  .then(r => r.json());

console.log("Loaded phonemes:", Object.keys(bank.phonemes));

// -----------------------------
// KEY MAP
// -----------------------------
const keyMap = {
  A: "AA",
  E: "E",
  H: "HH",
  T: "T",
  S: "S"
};

// -----------------------------
// AUDIO UNLOCK
// -----------------------------
async function unlockAudio() {
  if (ctx.state !== "running") {
    await ctx.resume();
  }
}

// -----------------------------
// PLAY FUNCTION
// -----------------------------
function play(phoneme) {
  const target = bank.phonemes?.[phoneme];

  if (!target) {
    console.warn("Missing phoneme:", phoneme);
    return;
  }

  node.port.postMessage({
    type: "frame",
    target,
    transitionMs: 35
  });
}

// -----------------------------
// INPUT
// -----------------------------
window.addEventListener("keydown", async (e) => {
  await unlockAudio();

  const phoneme = keyMap[e.key.toUpperCase()];
  if (!phoneme) return;

  play(phoneme);
});

</script>

</body>
</html>
