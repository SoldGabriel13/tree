<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Klattsch Remote Keyboard</title>
</head>

<body>
  <h3>Klattsch Real-Time Formant Keyboard</h3>
  <p>Keys: A (AA), E (E), H (HH), T (T), S (S)</p>

<script type="module">
// ------------------------------
// IMPORT KLATTSCH (REMOTE)
// ------------------------------
import { bundled } from "https://esm.sh/klattsch@latest";
import workletUrl from "https://esm.sh/klattsch@latest/formant-worklet.js?url";

// ------------------------------
// AUDIO SETUP
// ------------------------------
const ctx = new AudioContext();

await ctx.audioWorklet.addModule(workletUrl);

const node = new AudioWorkletNode(ctx, "formant-processor", {
  outputChannelCount: [1]
});

node.connect(ctx.destination);

// ------------------------------
// PHONEME BANK
// ------------------------------
const bank = bundled["klatt1980-en"].phonemes;

console.log("Available phonemes:", Object.keys(bank));

// ------------------------------
// KEY → PHONEME MAP
// ------------------------------
const keyMap = {
  A: "AA",
  E: "E",
  H: "HH",
  T: "T",
  S: "S"
};

// ------------------------------
// AUDIO UNLOCK
// ------------------------------
async function unlockAudio() {
  if (ctx.state !== "running") {
    await ctx.resume();
    console.log("AudioContext running");
  }
}

// ------------------------------
// PLAY FUNCTION (LOW-LEVEL CONTROL)
// ------------------------------
function play(phoneme) {
  const target = bank[phoneme];

  if (!target) {
    console.warn("Missing phoneme in bank:", phoneme);
    return;
  }

  node.port.postMessage({
    type: "frame",
    target,
    transitionMs: 30
  });
}

// ------------------------------
// INPUT HANDLER
// ------------------------------
window.addEventListener("keydown", async (e) => {
  await unlockAudio();

  const key = e.key.toUpperCase();
  const phoneme = keyMap[key];

  if (!phoneme) return;

  play(phoneme);
});

</script>

</body>
</html>
