<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Klattsch Keyboard</title>
</head>

<body>
  <h3>Klattsch Keyboard (GitHub Pages)</h3>

<script type="module">

const ctx = new AudioContext();

// IMPORTANT: relative path ONLY
await ctx.audioWorklet.addModule("./src/formant-worklet.js");

const node = new AudioWorkletNode(ctx, "formant-processor", {
  outputChannelCount: [1]
});

node.connect(ctx.destination);

// load bank (relative path)
const bank = await fetch("./src/banks/klatt1980-en.json")
  .then(r => r.json());

// key mapping
const map = {
  A: "AA",
  E: "E",
  H: "HH",
  T: "T",
  S: "S"
};

async function unlock() {
  if (ctx.state !== "running") await ctx.resume();
}

function play(p) {
  const target = bank.phonemes?.[p];

  if (!target) {
    console.warn("Missing phoneme:", p);
    return;
  }

  node.port.postMessage({
    type: "frame",
    target,
    transitionMs: 35
  });
}

window.addEventListener("keydown", async (e) => {
  await unlock();

  const p = map[e.key.toUpperCase()];
  if (p) play(p);
});

</script>

</body>
</html>
